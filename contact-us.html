<body>

<div id="header-placeholder"></div>
<main>

<!-- CONTACT HERO -->
<section style="padding-top:64px;padding-bottom:24px;">
  <div class="wrap" style="max-width:720px;">
    <p class="eyebrow">Get in Touch</p>
    <h1 class="display" style="font-size:2.6rem;line-height:1.1;margin:14px 0 16px;font-weight:600;">
      Contact Us
    </h1>
    <p style="font-size:1.05rem;line-height:1.65;color:var(--muted);">
      Have a question about a video, a topic you'd like covered, or feedback to share? Fill out the
      form below and we'll get back to you.
    </p>
  </div>
</section>

<!-- CONTACT FORM -->
<section class="section-border" style="padding-top:48px;">
  <div class="wrap" style="max-width:720px;">
    <form id="contactForm" class="card" novalidate>
      <div style="margin-bottom:22px;">
        <label for="cf-name" style="display:block;font-family:'IBM Plex Mono',monospace;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:8px;">
          Name <span style="color:#B3483C;">*</span>
        </label>
        <input type="text" id="cf-name" name="name" required
          style="width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:2px;font-family:'Inter',sans-serif;font-size:0.98rem;background:var(--paper);color:var(--ink);"
          placeholder="Your full name">
        <div class="cf-error" data-for="cf-name" style="display:none;color:#B3483C;font-size:0.8rem;margin-top:6px;font-family:'IBM Plex Mono',monospace;">Please enter your name.</div>
      </div>

      <div style="margin-bottom:26px;">
        <label for="cf-email" style="display:block;font-family:'IBM Plex Mono',monospace;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:8px;">
          Email Address <span style="color:#B3483C;">*</span>
        </label>
        <input type="email" id="cf-email" name="email" required
          style="width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:2px;font-family:'Inter',sans-serif;font-size:0.98rem;background:var(--paper);color:var(--ink);"
          placeholder="you@example.com">
        <div class="cf-error" data-for="cf-email" style="display:none;color:#B3483C;font-size:0.8rem;margin-top:6px;font-family:'IBM Plex Mono',monospace;">Please enter a valid email address.</div>
      </div>

      <div style="margin-bottom:26px;">
        <label for="cf-message" style="display:block;font-family:'IBM Plex Mono',monospace;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:8px;">
          Message (optional)
        </label>
        <textarea id="cf-message" name="message" rows="5"
          style="width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:2px;font-family:'Inter',sans-serif;font-size:0.98rem;background:var(--paper);color:var(--ink);resize:vertical;"
          placeholder="Write your message here..."></textarea>
      </div>

      <button type="submit" class="btn btn-primary" style="border:none;cursor:pointer;font-size:0.88rem;">Send Message</button>
      <span id="cf-success" style="display:none;margin-left:16px;color:var(--green);font-family:'IBM Plex Mono',monospace;font-size:0.85rem;">&#10003; Thanks! Your message has been noted.</span>
    </form>

    <!-- MAIL ID OPTION -->
    <div style="margin-top:36px;padding-top:28px;border-top:1px solid var(--line);text-align:center;">
      <p class="mono" style="font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;">
        Prefer email?
      </p>
      <a href="mailto:mukulfinowings@gmail.com" style="font-family:'Fraunces',serif;font-size:1.15rem;font-weight:600;color:var(--green);text-decoration:none;">
        mukulfinowings@gmail.com
      </a>
    </div>
  </div>
</section>



</main>
<div id="footer-placeholder"></div>

<script src="js/main.min.js?v=1784105107753"></script>
</body>
</html>
